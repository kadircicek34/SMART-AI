openapi: 3.0.3
info:
  title: SMART-AI Platform Extensions
  version: 0.3.0
paths:
  /v1/keys/openrouter/status:
    get:
      summary: Check tenant OpenRouter key status
      responses:
        '200':
          description: Key status
  /v1/keys/openrouter:
    post:
      summary: Upsert tenant OpenRouter key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apiKey]
              properties:
                apiKey:
                  type: string
    delete:
      summary: Delete tenant OpenRouter key
      responses:
        '200':
          description: Deletion result
  /v1/jobs/research:
    post:
      summary: Start async research job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                model:
                  type: string
  /v1/jobs/{jobId}:
    get:
      summary: Get async job status/result
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job payload
  /v1/rag/documents:
    post:
      summary: Ingest tenant documents or URL into RAG knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  type: array
                  items:
                    type: object
                    properties:
                      document_id:
                        type: string
                      title:
                        type: string
                      content:
                        type: string
                      source:
                        type: string
                url:
                  type: string
                title:
                  type: string
                chunk_size:
                  type: integer
                chunk_overlap:
                  type: integer
    get:
      summary: List tenant RAG documents
      responses:
        '200':
          description: Document list
  /v1/rag/search:
    post:
      summary: Search tenant RAG knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                limit:
                  type: integer
                min_score:
                  type: number
  /v1/rag/documents/{documentId}:
    delete:
      summary: Delete tenant RAG document
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion result
