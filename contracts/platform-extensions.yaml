openapi: 3.0.3
info:
  title: SMART-AI Platform Extensions
  version: 1.1.0
paths:
  /v1/keys/openrouter/status:
    get:
      summary: Check tenant OpenRouter key status
      responses:
        '200':
          description: Key status
  /v1/keys/openrouter:
    post:
      summary: Upsert tenant OpenRouter key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apiKey]
              properties:
                apiKey:
                  type: string
    delete:
      summary: Delete tenant OpenRouter key
      responses:
        '200':
          description: Deletion result
  /v1/jobs/research:
    post:
      summary: Start async research job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                model:
                  type: string
  /v1/jobs/{jobId}:
    get:
      summary: Get async job status/result
      parameters:
        - in: path
          name: jobId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Job payload
  /v1/mcp/health:
    get:
      summary: Get MCP health snapshot and aggregated metrics
      responses:
        '200':
          description: MCP health payload
  /v1/mcp/health/{serverId}:
    get:
      summary: Get MCP health for a specific server
      parameters:
        - in: path
          name: serverId
          required: true
          schema:
            type: string
            enum: [mevzuat, borsa, yargi]
      responses:
        '200':
          description: Server health payload
  /v1/mcp/reset:
    post:
      summary: Reset MCP circuit for a specific server
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [serverId]
              properties:
                serverId:
                  type: string
                  enum: [mevzuat, borsa, yargi]
      responses:
        '200':
          description: Reset result
  /v1/mcp/flush:
    post:
      summary: Force persist MCP health snapshot
      responses:
        '200':
          description: Flush result
  /ui/dashboard:
    get:
      summary: Serve SMART-AI control dashboard HTML UI
      responses:
        '200':
          description: HTML page
  /ui/chat:
    get:
      summary: Serve SMART-AI chatbot web UI
      responses:
        '200':
          description: HTML page
  /v1/memory/items:
    post:
      summary: Memorize tenant-scoped memory items
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                items:
                  type: array
                  items:
                    type: object
                    required: [content]
                    properties:
                      memory_id:
                        type: string
                      content:
                        type: string
                      category:
                        type: string
                        enum: [profile, preference, habit, goal, todo, event, knowledge, relationship, note]
                      tags:
                        type: array
                        items:
                          type: string
                      source:
                        type: string
                      salience:
                        type: number
                auto_capture:
                  type: object
                  properties:
                    message:
                      type: string
    get:
      summary: List tenant memory items
      responses:
        '200':
          description: Memory list
  /v1/memory/search:
    post:
      summary: Search tenant memory with pre-retrieval decision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                limit:
                  type: integer
                min_score:
                  type: number
                categories:
                  type: array
                  items:
                    type: string
                force_retrieve:
                  type: boolean
  /v1/memory/stats:
    get:
      summary: Get tenant memory stats
      responses:
        '200':
          description: Stats payload
  /v1/memory/items/{memoryId}:
    delete:
      summary: Delete tenant memory item
      parameters:
        - in: path
          name: memoryId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion result
  /v1/rag/documents:
    post:
      summary: Ingest tenant documents or URL into RAG knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                documents:
                  type: array
                  items:
                    type: object
                    properties:
                      document_id:
                        type: string
                      title:
                        type: string
                      content:
                        type: string
                      source:
                        type: string
                url:
                  type: string
                title:
                  type: string
                chunk_size:
                  type: integer
                chunk_overlap:
                  type: integer
    get:
      summary: List tenant RAG documents
      responses:
        '200':
          description: Document list
  /v1/rag/search:
    post:
      summary: Search tenant RAG knowledge base
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query:
                  type: string
                limit:
                  type: integer
                min_score:
                  type: number
  /v1/rag/documents/{documentId}:
    delete:
      summary: Delete tenant RAG document
      parameters:
        - in: path
          name: documentId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deletion result
